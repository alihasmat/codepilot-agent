<svg width="820" height="560" viewBox="0 0 820 560" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L9 5 L1 9" fill="none" stroke="#64748b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .box { rx: 10; }
      .t { font-size: 14px; font-weight: 600; fill: #0f172a; }
      .s { font-size: 11.5px; fill: #475569; }
      .lbl { font-size: 11px; fill: #64748b; font-style: italic; }
      .flow { stroke: #64748b; stroke-width: 1.6; fill: none; }
    </style>
  </defs>

  <rect width="820" height="560" fill="#f8fafc"/>
  <text x="30" y="36" font-size="18" font-weight="700" fill="#0f172a">CodePilot: issue to pull request</text>

  <!-- 1 poll/classify -->
  <rect x="30" y="60" width="230" height="66" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2"/>
  <text x="46" y="86" class="t">1. Poll &amp; classify</text>
  <text x="46" y="106" class="s">Fetch ai-assignable issues,</text>
  <text x="46" y="120" class="s">sort into 5 task types</text>

  <!-- 2 explore -->
  <rect x="295" y="60" width="230" height="66" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="311" y="86" class="t">2. Explore repo</text>
  <text x="311" y="106" class="s">Clone locally, build token-</text>
  <text x="311" y="120" class="s">budgeted map, retrieve files</text>

  <!-- 3 skill -->
  <rect x="560" y="60" width="230" height="66" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="1.2"/>
  <text x="576" y="86" class="t">3. Load skill</text>
  <text x="576" y="106" class="s">Task-specific playbook</text>
  <text x="576" y="120" class="s">shapes the approach</text>

  <!-- 4 fix-verify loop -->
  <rect x="180" y="185" width="460" height="120" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="1.2"/>
  <text x="200" y="211" class="t">4. Fix &amp; verify loop  (up to 3 attempts)</text>
  <rect x="205" y="228" width="130" height="56" rx="8" fill="#ffffff" stroke="#fdba74"/>
  <text x="221" y="252" class="s">Coder proposes</text>
  <text x="221" y="268" class="s">a fix</text>
  <rect x="360" y="228" width="130" height="56" rx="8" fill="#ffffff" stroke="#fdba74"/>
  <text x="376" y="252" class="s">Apply in</text>
  <text x="376" y="268" class="s">sandbox</text>
  <rect x="515" y="228" width="105" height="56" rx="8" fill="#ffffff" stroke="#fdba74"/>
  <text x="531" y="252" class="s">Test agent</text>
  <text x="531" y="268" class="s">verifies</text>
  <path class="flow" d="M335 256 H360" marker-end="url(#arr)"/>
  <path class="flow" d="M490 256 H515" marker-end="url(#arr)"/>
  <path class="flow" d="M567 284 V300 H270 V284" marker-end="url(#arr)"/>
  <text x="330" y="316" class="lbl">failures fed back as new context</text>

  <!-- guardrails band -->
  <rect x="30" y="185" width="130" height="120" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
  <text x="46" y="211" class="t">Guardrails</text>
  <text x="46" y="232" class="s">Block unsafe</text>
  <text x="46" y="246" class="s">commands and</text>
  <text x="46" y="260" class="s">protected files.</text>
  <text x="46" y="280" class="s">Wrap every</text>
  <text x="46" y="294" class="s">write and run.</text>

  <!-- memory band -->
  <rect x="660" y="185" width="130" height="120" rx="10" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.2"/>
  <text x="676" y="211" class="t">Memory</text>
  <text x="676" y="232" class="s">Recall lessons</text>
  <text x="676" y="246" class="s">before; store</text>
  <text x="676" y="260" class="s">new ones after.</text>
  <text x="676" y="280" class="s">Working,</text>
  <text x="676" y="294" class="s">episodic, semantic.</text>

  <!-- 5 gates -->
  <rect x="180" y="360" width="200" height="70" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="1.2"/>
  <text x="196" y="386" class="t">5. Human approval</text>
  <text x="196" y="406" class="s">Approve fix; pass the</text>
  <text x="196" y="420" class="s">four safety gates</text>

  <!-- 6 PR -->
  <rect x="440" y="360" width="200" height="70" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2"/>
  <text x="456" y="386" class="t">6. Open PR</text>
  <text x="456" y="406" class="s">Branch, commit, push,</text>
  <text x="456" y="420" class="s">structured description</text>

  <!-- vertical flows -->
  <path class="flow" d="M260 93 H295" marker-end="url(#arr)"/>
  <path class="flow" d="M525 93 H560" marker-end="url(#arr)"/>
  <path class="flow" d="M410 126 V185" marker-end="url(#arr)"/>
  <path class="flow" d="M410 305 V360" marker-end="url(#arr)"/>
  <path class="flow" d="M380 395 H440" marker-end="url(#arr)"/>

  <!-- state machine footer -->
  <rect x="30" y="470" width="760" height="60" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="46" y="495" class="t">State machine (owned by code, not the model)</text>
  <text x="46" y="516" class="s">TRIAGED → EXPLORING → IMPLEMENTING → TESTING → PR_OPENED → DONE / FAILED</text>
</svg>
